<script>
    document.getElementById('formularioReserva').addEventListener('submit', function(e) {
        // 1. Detenemos la recarga de la página (sustituye al antiguo return false)
        e.preventDefault(); 

        // 2. Validaciones integradas
        const tipoZona = document.getElementById('tipoZonaSelect').value;
        const numeroZona = document.getElementById('numeroZonaSelect').value;
        const dia = document.getElementById('fechaInput').value;       
        const horaIni = document.getElementById('horaInicioInput').value;   
        const horaFin = document.getElementById('horaFinInput').value;  
        
        if (tipoZona === "-1" || numeroZona === "-1") {
            alert("Por favor, selecciona un tipo y un número de zona válidos.");
            return; // Corta la ejecución si hay error
        }

        if(horaFin <= horaIni) {
            alert("La hora de fin debe ser posterior a la hora de inicio.");
            return; // Corta la ejecución si hay error
        }
        if(tipoZona === "1" && (numeroZona < 1 || numeroZona > 7)) {
            alert("Para la zona piscina, el número de zona debe estar entre 1 y 7.");
            return; // Corta la ejecución si hay error
        }
        if(tipoZona === "2" && (numeroZona < 8 || numeroZona > 14)) {
            alert("Para la zona de barbacoa, el número de zona debe estar entre 8 y 14.");
            return; // Corta la ejecución si hay error
        }
        if(tipoZona === "3" && (numeroZona < 15 || numeroZona > 21)) {
            alert("Para la zona Premium, el número de zona debe estar entre 15 y 21.");
            return; // Corta la ejecución si hay error
        }

        // 3. Preparar los datos si las validaciones son correctas
        const datos = new URLSearchParams();
        datos.append('nombre', document.getElementById('nombreInput').value);
        datos.append('apellidos', document.getElementById('apellidosInput').value);
        datos.append('correo', document.getElementById('correoInput').value);
        datos.append('tipoZona', tipoZona);
        datos.append('numeroZona', numeroZona);

        const fIniCompleta = dia + " " + horaIni + ":00"; 
        const fFinCompleta = dia + " " + horaFin + ":00";
        datos.append('f_ini', fIniCompleta);
        datos.append('f_fin', fFinCompleta);

        // 4. Enviar a Spring Boot
        fetch('http://localhost:8080/api/realizarReserva', {
            method: 'POST',
            body: datos
        })
        .then(respuesta => respuesta.text())
        .then(mensaje => {
            alert(mensaje); // Mostrará el mensaje que devuelve Oracle/Java
            if(mensaje.includes("correctamente")) {
                document.getElementById('formularioReserva').reset(); // Limpia el formulario
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("No se pudo conectar con el servidor Java.");
        });
    });
</script>
